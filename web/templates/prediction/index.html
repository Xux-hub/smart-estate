{% extends 'base.html' %}

{% block title %}房价预测 - 智慧房源探索平台{% endblock %}

{% block content %}

<h2 class="mb-4">
    <i class="bi bi-graph-up-arrow text-primary"></i>
    房价预测
</h2>

<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-lg-2 col-md-4">
                <label class="form-label">省份</label>
                <select id="provinceSelect" class="form-select">
                    {% for province in provinces %}
                    <option value="{{ province }}">{{ province }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-4">
                <label class="form-label">城市</label>
                <select id="citySelect" class="form-select">
                    {% for city in cities %}
                    <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-4">
                <label class="form-label">区域</label>
                <select id="districtSelect" class="form-select">
                    {% for region in regions %}
                    <option value="{{ region }}">{{ region }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-4">
                <label class="form-label">建筑面积</label>
                <input
                    id="areaInput"
                    type="number"
                    min="10"
                    max="1000"
                    step="0.1"
                    value="90"
                    class="form-control"
                >
            </div>

            <div class="col-lg-2 col-md-4">
                <label class="form-label">户型</label>
                <select id="layoutSelect" class="form-select">
                    {% for item in layouts %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-4">
                <label class="form-label">朝向</label>
                <select id="orientationSelect" class="form-select">
                    {% for item in orientations %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-4">
                <label class="form-label">装修情况</label>
                <select id="decorationSelect" class="form-select">
                    {% for item in decorations %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-4">
                <button
                    id="predictButton"
                    class="btn btn-primary w-100"
                >
                    开始预测
                </button>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 mb-4">
        <div class="card h-100">
            <div class="card-header">
                当前估值与区域平均单价
            </div>
            <div class="card-body">
                <div
                    id="currentChart"
                    style="height: 400px;"
                ></div>
            </div>
        </div>
    </div>

    <div class="col-lg-4 mb-4">
        <div class="card h-100">
            <div class="card-header">
                当前估值结果
            </div>
            <div
                id="currentResult"
                class="card-body"
            >
                <div class="text-center text-muted py-5">
                    请选择房源条件并开始预测
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header">
        未来6个月房价参考趋势
    </div>
    <div class="card-body">
        <div
            id="futureChart"
            style="height: 460px;"
        ></div>
    </div>
</div>

<div
    id="futureSummary"
    class="row mb-4"
></div>

{% endblock %}

{% block extra_js %}

<script>
const cityRegions = {{ city_regions_json|safe }};

const currentChart = echarts.init(
    document.getElementById('currentChart')
);

const futureChart = echarts.init(
    document.getElementById('futureChart')
);

function formatNumber(value, digits = 0) {
    if (
        value === null
        || value === undefined
        || Number.isNaN(Number(value))
    ) {
        return '暂无';
    }

    return Number(value).toLocaleString(
        'zh-CN',
        {
            minimumFractionDigits: digits,
            maximumFractionDigits: digits
        }
    );
}

function refreshDistrictOptions() {
    const city = document.getElementById(
        'citySelect'
    ).value;

    const districtSelect = document.getElementById(
        'districtSelect'
    );

    const regions = cityRegions[city] || [];

    districtSelect.innerHTML = '';

    regions.forEach(region => {
        const option = document.createElement('option');
        option.value = region;
        option.textContent = region;
        districtSelect.appendChild(option);
    });
}

function showError(message) {
    currentChart.clear();
    futureChart.clear();

    document.getElementById(
        'currentResult'
    ).innerHTML =
        '<div class="alert alert-danger mb-0">'
        + message
        + '</div>';

    document.getElementById(
        'futureSummary'
    ).innerHTML = '';
}

function drawCurrentChart(data) {
    currentChart.clear();

    currentChart.setOption({
        tooltip: {
            trigger: 'axis',
            axisPointer: {
                type: 'shadow'
            }
        },
        xAxis: {
            type: 'category',
            data: [
                '区域平均单价',
                '当前预测单价'
            ]
        },
        yAxis: {
            type: 'value',
            name: '元/㎡'
        },
        series: [
            {
                type: 'bar',
                barWidth: '45%',
                data: [
                    data.region_average_unit_price,
                    data.predicted_unit_price
                ]
            }
        ],
        grid: {
            left: '12%',
            right: '6%',
            bottom: '12%'
        }
    });
}

function drawFutureChart(data) {
    const history = data.history || [];
    const future = data.future || [];

    const months = history
        .map(item => item.month)
        .concat(
            future.map(item => item.month)
        );

    const historyValues = history
        .map(item => item.region_unit_price)
        .concat(
            new Array(future.length).fill(null)
        );

    const emptyBefore = new Array(
        Math.max(history.length - 1, 0)
    ).fill(null);

    const lastHistoryPrice =
        history.length > 0
            ? history[history.length - 1].region_unit_price
            : null;

    const trendValues = emptyBefore
        .concat([lastHistoryPrice])
        .concat(
            future.map(item => item.region_unit_price)
        );

    const houseFutureValues = emptyBefore
        .concat([data.predicted_unit_price])
        .concat(
            future.map(item => item.house_unit_price)
        );

    futureChart.clear();

    futureChart.setOption({
        tooltip: {
            trigger: 'axis'
        },
        legend: {
            data: [
                '历史区域月度单价',
                '未来区域月度单价',
                '具体房屋未来单价'
            ]
        },
        xAxis: {
            type: 'category',
            boundaryGap: false,
            data: months
        },
        yAxis: {
            type: 'value',
            name: '元/㎡',
            scale: true
        },
        series: [
            {
                name: '历史区域月度单价',
                type: 'line',
                smooth: true,
                data: historyValues
            },
            {
                name: '未来区域月度单价',
                type: 'line',
                smooth: true,
                lineStyle: {
                    type: 'dashed'
                },
                data: trendValues
            },
            {
                name: '具体房屋未来单价',
                type: 'line',
                smooth: true,
                lineStyle: {
                    type: 'dashed'
                },
                data: houseFutureValues
            }
        ],
        grid: {
            left: '10%',
            right: '6%',
            bottom: '12%'
        }
    });
}

function showCurrentResult(data) {
    let comparisonText = '暂无区域均价';

    if (
        data.difference !== null
        && data.difference_rate !== null
    ) {
        const direction =
            data.difference >= 0
                ? '高于'
                : '低于';

        comparisonText =
            direction
            + '区域均价 '
            + formatNumber(
                Math.abs(data.difference),
                0
            )
            + ' 元/㎡，差异 '
            + formatNumber(
                Math.abs(data.difference_rate),
                2
            )
            + '%';
    }

    document.getElementById(
        'currentResult'
    ).innerHTML =
        '<div class="text-center mb-4">'
        + '<div class="text-muted">当前预测单价</div>'
        + '<h2 class="text-primary">'
        + formatNumber(
            data.predicted_unit_price,
            0
        )
        + ' <small class="fs-6">元/㎡</small>'
        + '</h2>'
        + '<div class="text-muted">当前预测总价</div>'
        + '<h4>'
        + formatNumber(
            data.predicted_total_price,
            2
        )
        + ' 万元</h4>'
        + '</div>'
        + '<hr>'
        + '<p><strong>省市区域：</strong>'
        + data.province
        + ' / '
        + data.city
        + ' / '
        + data.region
        + '</p>'
        + '<p><strong>区域平均单价：</strong>'
        + formatNumber(
            data.region_average_unit_price,
            0
        )
        + ' 元/㎡</p>'
        + '<p class="mb-0"><strong>价格对比：</strong>'
        + comparisonText
        + '</p>';
}

function showFutureSummary(data) {
    const summary = data.future_summary;
    const change = Number(
        summary.six_month_change_rate
    );

    const changeText =
        (change >= 0 ? '+' : '')
        + formatNumber(change, 2)
        + '%';

    document.getElementById(
        'futureSummary'
    ).innerHTML =
        '<div class="col-md-3 mb-3">'
        + '<div class="card h-100"><div class="card-body text-center">'
        + '<div class="text-muted">未来1个月</div>'
        + '<h5>'
        + formatNumber(summary.month_1_unit_price, 0)
        + ' 元/㎡</h5>'
        + '<div>'
        + formatNumber(summary.month_1_total_price, 2)
        + ' 万元</div>'
        + '</div></div></div>'

        + '<div class="col-md-3 mb-3">'
        + '<div class="card h-100"><div class="card-body text-center">'
        + '<div class="text-muted">未来3个月</div>'
        + '<h5>'
        + formatNumber(summary.month_3_unit_price, 0)
        + ' 元/㎡</h5>'
        + '<div>'
        + formatNumber(summary.month_3_total_price, 2)
        + ' 万元</div>'
        + '</div></div></div>'

        + '<div class="col-md-3 mb-3">'
        + '<div class="card h-100"><div class="card-body text-center">'
        + '<div class="text-muted">未来6个月</div>'
        + '<h5>'
        + formatNumber(summary.month_6_unit_price, 0)
        + ' 元/㎡</h5>'
        + '<div>'
        + formatNumber(summary.month_6_total_price, 2)
        + ' 万元</div>'
        + '</div></div></div>'

        + '<div class="col-md-3 mb-3">'
        + '<div class="card h-100"><div class="card-body text-center">'
        + '<div class="text-muted">趋势判断</div>'
        + '<h5>'
        + summary.trend
        + '</h5>'
        + '<div>累计变化 '
        + changeText
        + '</div>'
        + '<div class="small text-muted mt-2">趋势来源：'
        + data.trend_source
        + '</div>'
        + '</div></div></div>';
}

function startPrediction() {
    const province = document.getElementById(
        'provinceSelect'
    ).value;

    const city = document.getElementById(
        'citySelect'
    ).value;

    const district = document.getElementById(
        'districtSelect'
    ).value;

    const area = document.getElementById(
        'areaInput'
    ).value;

    const huxing = document.getElementById(
        'layoutSelect'
    ).value;

    const chaoxiang = document.getElementById(
        'orientationSelect'
    ).value;

    const zhuangxiu = document.getElementById(
        'decorationSelect'
    ).value;

    if (!city) {
        showError('请选择城市');
        return;
    }

    if (!district) {
        showError('请选择区域');
        return;
    }

    if (!area || Number(area) <= 0) {
        showError('请输入正确的建筑面积');
        return;
    }

    const parameters = new URLSearchParams({
        province,
        city,
        district,
        area,
        huxing,
        chaoxiang,
        zhuangxiu
    });

    const button = document.getElementById(
        'predictButton'
    );

    button.disabled = true;
    button.textContent = '预测中';

    fetch(
        '/prediction/api/data/?'
        + parameters.toString()
    )
    .then(async response => {
        const result = await response.json();

        if (!response.ok) {
            throw new Error(
                result.error || '预测请求失败'
            );
        }

        return result.data;
    })
    .then(data => {
        drawCurrentChart(data);
        drawFutureChart(data);
        showCurrentResult(data);
        showFutureSummary(data);
    })
    .catch(error => {
        showError(error.message);
    })
    .finally(() => {
        button.disabled = false;
        button.textContent = '开始预测';
    });
}

document.getElementById(
    'citySelect'
).addEventListener(
    'change',
    refreshDistrictOptions
);

document.getElementById(
    'predictButton'
).addEventListener(
    'click',
    startPrediction
);

window.addEventListener(
    'resize',
    () => {
        currentChart.resize();
        futureChart.resize();
    }
);
</script>

{% endblock %}
