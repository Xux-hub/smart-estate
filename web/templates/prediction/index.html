{% extends 'base.html' %}

{% block title %}房价预测 - 智慧房源探索平台{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-graph-up-arrow text-primary"></i> 房价预测</h2>

<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label">选择城市</label>
                <select id="citySelect" class="form-select">
                    {% for city in cities %}
                    <option value="{{ city.name }}">{{ city.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">选择区域</label>
                <select id="districtSelect" class="form-select"><option value="">全部区域</option></select>
            </div>
            <div class="col-md-2">
                <button id="predictBtn" class="btn btn-primary w-100">查看预测</button>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 mb-4"><div class="card h-100"><div class="card-header">未来 6 个月均价趋势</div><div class="card-body"><div id="trendChart" style="height:400px"></div></div></div></div>
    <div class="col-lg-4 mb-4"><div class="card h-100"><div class="card-header">预测结果</div><div class="card-body" id="predictionResult"><div class="text-center text-muted py-5">请选择城市或区域</div></div></div></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const trendChart = echarts.init(document.getElementById('trendChart'));

function loadDistricts(city) {
    fetch('/house/api/districts/?city=' + encodeURIComponent(city)).then((r) => r.json()).then((data) => {
        const select = document.getElementById('districtSelect');
        select.innerHTML = '<option value="">全部区域</option>';
        data.districts.forEach((d) => {
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.textContent = d.name;
            select.appendChild(opt);
        });
    });
}

function loadPrediction() {
    const city = document.getElementById('citySelect').value;
    const district = document.getElementById('districtSelect').value;
    let url = '/prediction/api/data/?city=' + encodeURIComponent(city);
    if (district) url += '&district=' + encodeURIComponent(district);

    fetch(url).then((r) => r.json()).then((res) => {
        const data = res.data;
        if (!data.length) {
            trendChart.setOption({ title: { text: '暂无预测数据', left: 'center', top: 'middle' }, xAxis: { show: false }, yAxis: { show: false }, series: [] });
            document.getElementById('predictionResult').innerHTML = '<div class="text-center text-muted py-5">暂无可用于预测的数据</div>';
            return;
        }
        trendChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: data.map((d) => d.predict_date) },
            yAxis: { type: 'value', name: '元/㎡' },
            series: [{ type: 'line', smooth: true, data: data.map((d) => Number(d.avg_price)), lineStyle: { color: '#2563eb', width: 3 }, areaStyle: { color: 'rgba(37,99,235,.12)' } }],
            grid: { left: '10%', right: '5%', bottom: '10%' }
        });
        const latest = data[data.length - 1];
        document.getElementById('predictionResult').innerHTML =
            '<div class="text-center">' +
            '<h3>' + latest.trend + '</h3>' +
            '<h4>' + Math.round(latest.avg_price) + ' <small>元/㎡</small></h4>' +
            '<p class="text-muted">预测日期: ' + latest.predict_date + '</p>' +
            '<p>变化率: ' + latest.change_rate + '%</p>' +
            '<p>置信度: ' + (latest.confidence * 100).toFixed(1) + '%</p>' +
            '</div>';
    });
}

document.getElementById('citySelect').addEventListener('change', function() { loadDistricts(this.value); });
document.getElementById('predictBtn').addEventListener('click', loadPrediction);
if (document.getElementById('citySelect').value) loadDistricts(document.getElementById('citySelect').value);
window.addEventListener('resize', () => trendChart.resize());
</script>
{% endblock %}
