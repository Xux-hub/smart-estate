<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}智慧房源探索平台{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home:index' %}">
                <i class="bi bi-house-heart-fill"></i> 智慧房源探索平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home:index' %}"><i class="bi bi-speedometer2"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'house:list' %}"><i class="bi bi-building"></i> 房源浏览</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'analysis:index' %}"><i class="bi bi-bar-chart-line"></i> 数据分析</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'prediction:index' %}"><i class="bi bi-graph-up-arrow"></i> 房价预测</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'house:search' %}"><i class="bi bi-search"></i> 搜索</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="{% block main_class %}container py-4{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container d-flex justify-content-between flex-wrap gap-3">
            <div>
                <h5><i class="bi bi-house-heart-fill"></i> 智慧房源探索平台</h5>
                <p class="text-secondary mb-0">基于 Django、MySQL 与 ECharts 的房源查询、分析和预测系统</p>
            </div>
            <div class="text-secondary small">Python + Django + MySQL + ECharts</div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
