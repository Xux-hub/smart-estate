{% extends 'base.html' %}

{% block title %}爬虫管理 - 智慧房源探索平台{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-robot text-primary"></i> 爬虫管理</h2>

<div class="card mb-4">
    <div class="card-header"><i class="bi bi-play-circle"></i> 启动爬虫任务</div>
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label">目标城市</label>
                <input id="crawlerCity" class="form-control" value="济南">
            </div>
            <div class="col-md-2">
                <label class="form-label">采集页数</label>
                <input type="number" id="crawlerPages" class="form-control" value="3" min="1" max="50">
            </div>
            <div class="col-md-2">
                <button id="startBtn" class="btn btn-primary w-100" onclick="startCrawler()">
                    <i class="bi bi-play-fill"></i> 启动采集
                </button>
            </div>
            <div class="col-md-5">
                <div id="startMessage" class="alert alert-info d-none mb-0 py-2" role="alert"></div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-list-task"></i> 任务记录</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="refreshTasks()"><i class="bi bi-arrow-clockwise"></i> 刷新</button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>任务ID</th><th>城市</th><th>页数</th><th>状态</th><th>开始时间</th><th>结束时间</th><th>操作</th></tr>
            </thead>
            <tbody id="taskTableBody"><tr><td colspan="7" class="text-center text-muted py-4">暂无任务记录</td></tr></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="taskDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-terminal"></i> 任务详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <strong>输出日志</strong>
                <pre id="taskOutput" class="bg-dark text-light p-3 rounded mt-2" style="max-height: 260px; overflow-y: auto;"></pre>
                <strong>错误信息</strong>
                <pre id="taskError" class="bg-danger bg-opacity-10 text-danger p-3 rounded mt-2" style="max-height: 180px; overflow-y: auto;"></pre>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let pollingInterval = null;

function startCrawler() {
    const city = document.getElementById('crawlerCity').value;
    const pages = parseInt(document.getElementById('crawlerPages').value, 10);
    const btn = document.getElementById('startBtn');
    const msg = document.getElementById('startMessage');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 启动中';

    fetch('/house/crawler/start/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ city, pages })
    }).then((r) => r.json().then((data) => ({ ok: r.ok, data }))).then((res) => {
        msg.classList.remove('d-none', 'alert-danger', 'alert-success', 'alert-info');
        msg.classList.add(res.ok ? 'alert-success' : 'alert-danger');
        msg.textContent = res.ok ? res.data.message : res.data.error;
        if (res.ok) startPolling(res.data.task_id);
    }).finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-play-fill"></i> 启动采集';
    });
}

function startPolling(taskId) {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(() => {
        fetch('/house/crawler/status/' + taskId + '/').then((r) => r.json()).then((task) => {
            if (task.status !== 'running') clearInterval(pollingInterval);
            refreshTasks();
        });
    }, 3000);
    refreshTasks();
}

function refreshTasks() {
    fetch('/house/crawler/list/').then((r) => r.json()).then((res) => {
        const tbody = document.getElementById('taskTableBody');
        if (!res.tasks || !res.tasks.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">暂无任务记录</td></tr>';
            return;
        }
        tbody.innerHTML = res.tasks.map((task) => (
            '<tr>' +
            '<td><code class="small">' + task.task_id + '</code></td>' +
            '<td>' + task.city + '</td>' +
            '<td>' + task.pages + '</td>' +
            '<td><span class="badge bg-secondary">' + task.status + '</span></td>' +
            '<td class="small">' + task.started_at + '</td>' +
            '<td class="small">' + (task.finished_at || '-') + '</td>' +
            '<td><button class="btn btn-sm btn-outline-info" onclick="showDetail(\'' + task.task_id + '\')"><i class="bi bi-eye"></i></button></td>' +
            '</tr>'
        )).join('');
    });
}

function showDetail(taskId) {
    fetch('/house/crawler/status/' + taskId + '/').then((r) => r.json()).then((task) => {
        document.getElementById('taskOutput').textContent = task.output || '无输出';
        document.getElementById('taskError').textContent = task.error || '无错误';
        new bootstrap.Modal(document.getElementById('taskDetailModal')).show();
    });
}

refreshTasks();
</script>
{% endblock %}
