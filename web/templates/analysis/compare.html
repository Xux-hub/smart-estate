{% extends 'base.html' %}

{% block title %}区域对比 - 智慧房源探索平台{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-arrow-left-right text-primary"></i> 区域房价对比</h2>

<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label">选择城市</label>
                <select id="citySelect" class="form-select">
                    {% for city in cities %}
                    <option value="{{ city.name }}">{{ city.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <button id="compareBtn" class="btn btn-primary w-100">开始对比</button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">区域均价对比</div>
    <div class="card-body"><div id="compareChart" style="height: 450px;"></div></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const compareChart = echarts.init(document.getElementById('compareChart'));
function loadCompare() {
    const city = document.getElementById('citySelect').value;
    fetch('/analysis/api/price-distribution/?city=' + encodeURIComponent(city)).then((r) => r.json()).then((res) => {
        const data = res.data.sort((a, b) => (b.avg_price || 0) - (a.avg_price || 0));
        compareChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: data.map((d) => d.name), axisLabel: { rotate: 45 } },
            yAxis: { type: 'value', name: '元/㎡' },
            series: [{ type: 'bar', data: data.map((d) => Math.round(d.avg_price || 0)), label: { show: true, position: 'top' }, itemStyle: { color: '#0f766e' } }],
            grid: { left: '8%', right: '5%', bottom: '18%', top: '10%' }
        });
    });
}
document.getElementById('compareBtn').addEventListener('click', loadCompare);
if (document.getElementById('citySelect').value) loadCompare();
window.addEventListener('resize', () => compareChart.resize());
</script>
{% endblock %}
